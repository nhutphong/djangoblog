{% extends 'base.html' %}

{% block title %}
  <title>article detail</title>
{% endblock title %}
  
{% block content %}

<div class="container">

  <div class="card" style="width: 18rem;">
    <div class="card-body">
      <h5 class="card-title">{{ article.title }}</h5>
      <h6 class="card-subtitle mb-2 text-muted">Card subtitle</h6>
      <p class="card-text">
        {{ article.content }}
      </p>

      {% if request.user.is_authenticated %}
        
        <a
         class="btn btn-outline-primary" 
         href="{% url 'articles:article-update' article.id %}"
         >
          Edit
        </a>

        <a 
          class="btn btn-outline-danger" 
          href="{% url 'articles:article-delete' article.id %}"
        >
          Delete
        </a>
        
      {% endif %}
    </div>
  </div>


</div>

{% endblock %}
